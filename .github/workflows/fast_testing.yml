name: fast_testing

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  version-check:
    # We need this job to run only on push with tag.
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-22.04
    steps:
      - name: Check module version
        uses: tarantool/actions/check-module-version@master
        with:
          module-name: 'vshard'

  linux:
    # We want to run on external PRs, but not on our own internal
    # PRs as they'll be run by the push to the branch.
    #
    # The main trick is described here:
    # https://github.com/Dart-Code/Dart-Code/pull/2375
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository

    strategy:
      fail-fast: false
      matrix:
        tarantool:
          - '1.10'
          - '2.11'
          - '3.2'
          - '3.3'
          - 'release-master'

    runs-on: ubuntu-22.04
    steps:
      - name: Clone the module
        uses: actions/checkout@v3
        with:
          # Fetch the entire history for all branches and tags. It is needed for
          # upgrade testing.
          fetch-depth: 0
          # Enable recursive submodules checkout as test-run git module is used
          # for running tests.
          submodules: recursive

      - name: Setup Tarantool ${{ matrix.tarantool }}
        uses: ./.github/actions/setup-tarantool
        with:
          tarantool_version: ${{ matrix.tarantool }}

      - name: Install test requirements
        run: pip3 install --user -r test-run/requirements.txt

      - name: Setup tt
        run: |
          curl -L https://tarantool.io/release/2/installer.sh | sudo bash
          sudo apt install -y tt
          tt version

      - name: Setup luatest
        run: tt rocks install luatest 1.4.1

      - run: cmake .
      - run: make test-force
